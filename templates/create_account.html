<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Cyber Threat Intelligence Aggregator</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #e0f7fa;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: rgba(0, 0, 0, 0.75);
      padding: 30px;
      border-radius: 12px;
      width: 350px;
      text-align: center;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.6);
      animation: fadeIn 1s ease;
    }

    h2 {
      margin-bottom: 20px;
      color: #00bcd4;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 6px;
      outline: none;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      background: #00bcd4;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #008c9e;
    }

    .link {
      margin-top: 15px;
      font-size: 14px;
    }

    .link a {
      color: #00bcd4;
      text-decoration: none;
    }

    .link a:hover {
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message {
      margin-top: 15px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Create Account</h2>
    {% if error %}
      <div class="message" style="color: #ff6b6b;">
        {{ error }}
      </div>
    {% endif %}

    {% if success %}
      <div class="message" style="color: #00e676;">
        {{ success }}
      </div>
    {% endif %}


    <!-- ✅ Flask-connected form -->
    <form action="/register" method="POST">
      <input type="text" name="username" placeholder="Full Name" required><br>
      <input type="email" name="email" placeholder="Email" required><br>
      <input type="password" name="password" placeholder="Password" required><br>
      <input type="password" name="confirm_password" placeholder="Confirm Password" required><br>
      <button type="submit">Sign Up</button>
    </form>

    <div class="link">
      Already have an account?
      <a href="/login">Sign In</a>
    </div>
  </div>
</body>

</html>
